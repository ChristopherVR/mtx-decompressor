# git-cliff configuration — generates CHANGELOG.md from Conventional Commits.
# https://git-cliff.org

[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
This file is generated from [Conventional Commits](https://www.conventionalcommits.org)
by [git-cliff](https://git-cliff.org); do not edit it by hand.\n
"""
body = """
{% set repo = "https://github.com/ChristopherVR/mtx-decompressor" %}\
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}]({{ repo }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}]({{ repo }}/commit/{{ commit.id }})){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
	{ message = "^feat", group = "<!-- 0 -->Features" },
	{ message = "^fix", group = "<!-- 1 -->Bug Fixes" },
	{ message = "^perf", group = "<!-- 2 -->Performance" },
	{ message = "^refactor", group = "<!-- 3 -->Refactor" },
	{ message = "^docs", group = "<!-- 4 -->Documentation" },
	{ message = "^test", group = "<!-- 5 -->Testing" },
	{ message = "^(build|ci)", group = "<!-- 6 -->Build & CI" },
	{ message = "^style", group = "<!-- 7 -->Styling" },
	{ message = "^chore\\(release\\)", skip = true },
	{ message = "^chore", group = "<!-- 9 -->Chores" },
	{ message = "^revert", group = "<!-- 10 -->Reverts" },
	{ message = ".*", group = "<!-- 12 -->Other" },
]
filter_commits = false
topo_order = false
sort_commits = "oldest"
tag_pattern = "v[0-9]*.[0-9]*.[0-9]*"

[remote.github]
owner = "ChristopherVR"
repo = "mtx-decompressor"
