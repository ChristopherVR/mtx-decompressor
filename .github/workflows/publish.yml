name: Publish to npm

# Publishes mtx-decompressor to https://www.npmjs.com/package/mtx-decompressor
# on a published GitHub release. The package version is taken from the
# release tag (a leading "v" is stripped, so tag v1.4.0 publishes 1.4.0).
#
# Auth: OIDC trusted publishing — no secrets. On npmjs.com configure a trusted
# publisher for this package (GitHub Actions; owner ChristopherVR; repo
# mtx-decompressor; workflow publish.yml; environment npm) to match the
# id-token permission and `environment: npm` below. npm mints a short-lived
# token via OIDC and attaches provenance automatically. Requires npm >= 11.5.1
# (Node 24) and a public repository.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Set version from release tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          node -e "const fs=require('fs');const p='package.json';const d=JSON.parse(fs.readFileSync(p,'utf8'));d.version='${VERSION}';fs.writeFileSync(p,JSON.stringify(d,null,'\t')+'\n')"

      - name: Publish
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          EXISTING=$(npm view mtx-decompressor@"$VERSION" version 2>/dev/null || echo "")
          if [ "$EXISTING" = "$VERSION" ]; then
            echo "mtx-decompressor@$VERSION already published, skipping"
          else
            npm publish --provenance --access public
          fi
