name: Publish to npm

# On every push to main, publish the package.json version of mtx-decompressor
# to npm via OIDC trusted publishing (with provenance) when that version is not
# already on npm, then cut a matching GitHub release. To ship a new version,
# bump "version" in package.json and push to main.
#
# Why publish here (on push) rather than from a separate "release: published"
# event: a GitHub release created with the built-in GITHUB_TOKEN does NOT
# trigger other workflows (GitHub's loop-prevention rule), so a release->publish
# hop would never fire without a PAT. Doing both in one job avoids that.
#
# Auth: OIDC trusted publishing — no secrets. Configure a trusted publisher on
# npmjs.com for this package: GitHub Actions; owner ChristopherVR; repo
# mtx-decompressor; workflow publish.yml; environment npm. Requires a public repo.

on:
  push:
    branches: [main]

permissions:
  contents: write # create the GitHub release/tag
  id-token: write # OIDC trusted publishing + provenance

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Read package version
        id: v
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if already published
        id: check
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          if [ "$(npm view mtx-decompressor@"$VERSION" version 2>/dev/null || true)" = "$VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "mtx-decompressor@$VERSION already on npm — nothing to do."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure npm supports trusted publishing
        if: steps.check.outputs.publish == 'true'
        run: npm install -g npm@latest

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.v.outputs.version }}
          target_commitish: main
          name: v${{ steps.v.outputs.version }}
          generate_release_notes: true
