name: Publish to npm

# On push to main: build + test, and if the package.json version is not yet on
# npm, regenerate CHANGELOG.md (git-cliff), commit it back, publish to npm via
# OIDC trusted publishing (with provenance), and cut a GitHub release whose body
# is the new changelog section. To ship a release, bump "version" in
# package.json and push to main.
#
# The CHANGELOG commit is pushed with GITHUB_TOKEN and marked [skip ci]; pushes
# made with GITHUB_TOKEN do not retrigger workflows, so this does not loop.
#
# Auth: OIDC trusted publishing — no secrets. Configure a trusted publisher on
# npmjs.com: GitHub Actions; owner ChristopherVR; repo mtx-decompressor; workflow
# publish.yml; environment npm. Requires a public repo.

on:
  push:
    branches: [main]

permissions:
  contents: write # commit the changelog + create the release/tag
  id-token: write # OIDC trusted publishing + provenance

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Read package version
        id: v
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already on npm
        id: check
        run: |
          VERSION="${{ steps.v.outputs.version }}"
          if [ "$(npm view mtx-decompressor@"$VERSION" version 2>/dev/null || true)" = "$VERSION" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "mtx-decompressor@$VERSION already on npm — nothing to do."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.check.outputs.publish == 'true'
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.v.outputs.tag }} --output CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changelog
        if: steps.check.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- CHANGELOG.md; then
            git add CHANGELOG.md
            git commit -m "docs(changelog): ${{ steps.v.outputs.tag }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Extract latest release notes
        if: steps.check.outputs.publish == 'true'
        run: awk '/^## \[/{c++} c==1{print} c==2{exit}' CHANGELOG.md > "${RUNNER_TEMP}/notes.md"

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public

      - name: Create GitHub release
        if: steps.check.outputs.publish == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          target_commitish: main
          name: ${{ steps.v.outputs.tag }}
          body_path: ${{ runner.temp }}/notes.md
